apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeflare-config
data:
  config.yaml: |
    service:
      name: kubeflare
      environment: production
    http:
      address: ":8080"
      allowed_origins:
        - https://kubeflare.example.com
    auth:
      bootstrap_subject: admin
      bootstrap_roles: ["admin", "proxy"]
    database:
      enabled: true
    redis:
      enabled: true
      address: redis:6379
