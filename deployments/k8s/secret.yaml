apiVersion: v1
kind: Secret
metadata:
  name: kubeflare-secrets
type: Opaque
stringData:
  KUBEFLARE_AUTH__BOOTSTRAP_TOKEN: replace-with-long-random-bootstrap-token
  KUBEFLARE_DATABASE__DSN: postgres://kubeflare:change-me@postgres:5432/kubeflare?sslmode=disable
  KUBEFLARE_REDIS__PASSWORD: change-me
  KUBEFLARE_PROXY__ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
