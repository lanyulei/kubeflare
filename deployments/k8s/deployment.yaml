apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeflare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeflare
  template:
    metadata:
      labels:
        app: kubeflare
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kubeflare
          image: kubeflare:latest
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --config
            - /etc/kubeflare/config.yaml
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
          env:
            - name: KUBEFLARE_DATABASE__ENABLED
              value: "true"
            - name: KUBEFLARE_REDIS__ENABLED
              value: "true"
            - name: KUBEFLARE_DATABASE__DSN
              valueFrom:
                secretKeyRef:
                  name: kubeflare-secrets
                  key: KUBEFLARE_DATABASE__DSN
            - name: KUBEFLARE_AUTH__BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubeflare-secrets
                  key: KUBEFLARE_AUTH__BOOTSTRAP_TOKEN
            - name: KUBEFLARE_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubeflare-secrets
                  key: KUBEFLARE_REDIS__PASSWORD
            - name: KUBEFLARE_PROXY__ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeflare-secrets
                  key: KUBEFLARE_PROXY__ENCRYPTION_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/kubeflare
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kubeflare-config
