service:
  name: kubeflare
  environment: production

http:
  address: ":8000"
  read_timeout: 30s
  read_header_timeout: 10s
  write_timeout: 0s
  idle_timeout: 90s
  shutdown_timeout: 20s
  drain_timeout: 5s
  api_request_timeout: 10s
  max_header_bytes: 1048576
  allowed_origins:
    - https://kubeflare.example.com
  allow_headers:
    - Authorization
    - Content-Type
    - X-Request-Id
    - X-Kubeflare-CSRF
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  readiness_timeout: 2s

auth:
  signing_key: ${KUBEFLARE_AUTH__SIGNING_KEY}
  token_ttl: 24h
  refresh_token_ttl: 168h
  max_failed_attempts: 5
  lockout_duration: 15m
  captcha_failure_trigger: 3
  captcha_ttl: 5m
  cookie_secure: true
  cookie_domain: ""
  oidc:
    enabled: false
    issuer_url: ""
    client_id: ""
    client_secret: ""
    redirect_url: ""
    scopes:
      - openid
      - profile
      - email

database:
  enabled: true
  dsn: postgres://postgres:${KUBEFLARE_DB_PASSWORD}@127.0.0.1:5432/kubeflare?sslmode=disable
  max_open_conns: 40
  max_idle_conns: 20
  conn_max_lifetime: 30m
  conn_max_idle_time: 10m
  query_timeout: 5s
  health_check_timeout: 2s

redis:
  enabled: true
  address: 127.0.0.1:6379
  password: ${KUBEFLARE_REDIS_PASSWORD}
  db: 0
  dial_timeout: 2s
  read_timeout: 2s
  write_timeout: 2s
  pool_timeout: 4s
  min_idle_conns: 4
  max_idle_conns: 16
  pool_size: 32
  cache_ttl: 2m
  health_check_timeout: 2s

secrets:
  encryption_key: ${KUBEFLARE_SECRETS__ENCRYPTION_KEY}

upload:
  root_dir: data/uploads

observability:
  log_level: info
  log_format: text
  tracing:
    enabled: false
